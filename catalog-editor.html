<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatalogAI — Modern Tohum & Fide Kataloğu Editörü</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Premium Agricultural */
            --bg-deep: #0a0c0a;
            --bg-panel: #121512;
            --bg-card: #1a1e1a;
            --bg-accent: #232a23;
            
            --primary: #c29d5d; /* Gold/Amber */
            --primary-light: #e6c58d;
            --primary-dim: rgba(194, 157, 93, 0.15);
            
            --success: #4ade80;
            --success-dim: rgba(74, 222, 128, 0.1);
            
            --text-main: #e2e8e2;
            --text-muted: #8a9a8a;
            --text-dim: #4d5a4d;
            
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 20px;
            
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains+Mono', monospace;
            
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-sans);
            font-size: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Topbar ─────────────────────────────── */
        header {
            height: 64px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #8a6d3b);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-deep);
            font-weight: 700;
            font-size: 18px;
        }

        .brand-text {
            font-family: var(--font-serif);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #fff; /* Increased contrast for brand visibility */
        }

        .brand-text span {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            height: 38px;
            padding: 0 18px;
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-accent);
            color: var(--text-main);
            border-color: var(--border-hover);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-deep);
            box-shadow: 0 4px 12px rgba(194, 157, 93, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(194, 157, 93, 0.3);
        }

        /* ── Layout ─────────────────────────────── */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            overflow: hidden;
        }

        /* ── Left Sidebar ───────────────────────── */
        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
        }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 16px 0 40px;
            color: var(--text-main);
            font-family: var(--font-sans);
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-dim);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff; /* Increased contrast icon */
            font-size: 14px;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-accent);
            color: #bbb; /* Brighter inactive tabs */
        }

        .tab.active {
            background: var(--primary);
            color: var(--bg-deep);
            font-weight: 600;
        }

        .product-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 24px;
        }

        .product-list::-webkit-scrollbar { width: 4px; }
        .product-list::-webkit-scrollbar-thumb { background: var(--bg-accent); border-radius: 4px; }

        .product-card {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            position: relative;
        }

        .product-card:hover {
            background: var(--bg-card);
            border-color: var(--border-hover);
            transform: scale(1.02);
        }

        .product-card.selected {
            background: var(--primary-dim);
            border-color: var(--primary);
        }

        .product-thumb {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background: var(--bg-accent);
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .product-info h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #fff;
        }

        .product-info p {
            font-size: 11px;
            color: #ccc;
            margin-bottom: 6px;
        }

        .product-tag {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--success-dim);
            color: var(--success);
            font-weight: 600;
        }

        /* ── Main Canvas ────────────────────────── */
        .canvas {
            background: var(--bg-deep);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .canvas-toolbar {
            height: 48px;
            background: rgba(18, 21, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .canvas-scroll {
            flex: 1;
            overflow: auto;
            padding: 80px 40px 40px;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(var(--bg-panel) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .a4-page {
            width: 595px; /* A4 Ratio */
            height: 842px !important; /* Fixed A4 Height */
            background: #ffffff !important;
            color: #1a1e1a !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: 40px;
            display: flex;
            flex-direction: column;
            transform-origin: top center;
            transition: transform 0.3s var(--transition);
            overflow: hidden !important; /* Force pagination flow */
            position: relative;
        }

        /* ── Catalog Design ─────────────────────── */
        .catalog-header {
            border-bottom: 2px solid #1a1e1a;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .catalog-brand {
            font-family: var(--font-serif);
        }

        .catalog-brand h1 {
            font-size: 42px;
            line-height: 0.9;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .catalog-brand p {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 5px;
            color: #555;
        }
        /* ── Modal ─────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-panel);
            width: 400px;
            padding: 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-hover);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-family: var(--font-serif);
            font-size: 24px;
            margin-bottom: 24px;
            color: var(--primary);
        }
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .file-upload-label {
            height: 120px;
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
        }
        .file-upload-label:hover { border-color: var(--primary); background: var(--bg-accent); }
        .file-upload-label img { width: 100%; height: 100%; object-fit: cover; }
        #new-product-file { display: none; }

        .catalog-meta {
            text-align: right;
            font-size: 12px;
            color: #777;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            flex: 1;
        }

        .catalog-item {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.5s ease forwards;
        }

        .item-image-box {
            aspect-ratio: 1;
            background: #f7f9f7;
            border: 1px solid #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details h3 {
            font-family: var(--font-serif);
            font-size: 20px;
            margin-bottom: 4px;
            color: #1a1e1a !important;
        }

        .item-details p {
            font-size: 12px;
            color: #333 !important; /* Specific color for PDF visibility */
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .item-price {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 14px;
            color: #000 !important;
        }

        .empty-slot {
            border: 2px dashed #ddd;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .empty-slot:hover {
            background: #fcfcfc;
            border-color: #ccc;
        }

        .catalog-footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── Right Panel ────────────────────────── */
        .settings {
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 16px;
            font-weight: 600;
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrap label {
            display: block;
            font-size: 12px;
            color: #fff; /* High contrast label */
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-text {
            width: 100%;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 12px;
            color: var(--text-main);
            font-family: var(--font-sans);
            outline: none;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .layout-option {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .layout-option.active {
            border-color: var(--primary);
            background: var(--primary-dim);
        }

        .color-palette {
            display: flex;
            gap: 10px;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-swatch.active {
            border-color: #fff;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--primary);
            color: var(--bg-deep);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show { transform: translateY(0); }

        /* ── Print Styles ───────────────────────── */
        @media print {
            body, .main-container {
                height: auto !important;
                background: white !important;
                display: block !important;
                overflow: visible !important;
            }
            header, .sidebar, .settings, .canvas-toolbar, .toast, .empty-slot {
                display: none !important;
            }
            .canvas {
                padding: 0 !important;
                margin: 0 !important;
                background: none !important;
                overflow: visible !important;
                position: static !important;
            }
            .canvas-scroll {
                padding: 0 !important;
                background: none !important;
                display: block !important;
                overflow: visible !important;
            }
            .a4-page {
                box-shadow: none !important;
                transform: none !important;
                margin: 0 auto !important;
                width: 210mm !important; /* Proper A4 width */
                height: 297mm !important; /* Fixed A4 Height */
                border: none !important;
                padding: 15mm !important;
                page-break-after: always;
                color: #000 !important;
                background: #fff !important;
                overflow: hidden !important;
            }
            .catalog-item {
                break-inside: avoid;
            }
            @page {
                size: A4 portrait;
                margin: 0;
            }
        }

    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="logo-icon">K</div>
            <div class="brand-text">Katalog<span>AI</span></div>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost">Taslaklarak Kaydet</button>
            <button class="btn btn-primary" onclick="exportToPDF()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                PDF Dışa Aktar
            </button>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary);">Kütüphane</h2>
                    <button class="btn btn-primary" style="height: 32px; padding: 0 10px; font-size: 11px;" onclick="openAddProductModal()">+ Yeni Ürün</button>
                </div>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Ürün ara..." oninput="filterProducts(this.value)">
                </div>
                <div class="filter-tabs">
                    <div class="tab active" onclick="setCategory('tümü', this)">Tümü</div>
                    <div class="tab" onclick="setCategory('tohum', this)">Tohumlar</div>
                    <div class="tab" onclick="setCategory('fide', this)">Fideler</div>
                    <div class="tab" onclick="setCategory('gubre', this)">Gübreler</div>
                </div>
            </div>
            <div class="product-list" id="product-list">
                <!-- Products dynamically added here -->
            </div>
        </aside>

        <!-- Canvas -->
        <main class="canvas">
            <div class="canvas-toolbar">
                <div style="display: flex; gap: 12px; align-items: center;">
                    <span style="font-size: 12px; color: var(--text-muted);">Zoom:</span>
                    <button class="btn btn-ghost" style="height: 28px; width: 28px; padding: 0;" onclick="zoom(-0.1)">-</button>
                    <span id="zoom-text" style="font-size: 12px; width: 40px; text-align: center;">100%</span>
                    <button class="btn btn-ghost" style="height: 28px; width: 28px; padding: 0;" onclick="zoom(0.1)">+</button>
                </div>
                <div style="font-size: 12px; color: var(--text-dim); font-family: var(--font-mono);">A4 PORTRAIT (595x842)</div>
                <button class="btn btn-ghost" style="height: 28px;" onclick="resetCanvas()">Temizle</button>
            </div>
            <div class="canvas-scroll" id="canvas-pages-container">
                <!-- Pages will be dynamically rendered here -->
            </div>
        </main>

        <!-- Settings -->
        <aside class="settings">
            <div class="settings-section">
                <h2 class="section-title">Katalog Bilgileri</h2>
                <div class="group">
                    <div class="input-wrap">
                        <label>Marka Adı</label>
                        <input type="text" class="input-text" value="VISTA SEED" oninput="updateBrand(this.value)">
                    </div>
                    <div class="input-wrap">
                        <label>Alt Başlık</label>
                        <input type="text" class="input-text" value="2026 PROFESYONEL ÜRETİM KATALOĞU" oninput="updateSubtitle(this.value)">
                    </div>
                    <div class="input-wrap">
                        <label>Dönem / Sezon</label>
                        <input type="text" class="input-text" value="İLKBAHAR / YAZ" oninput="updateSeason(this.value)">
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h2 class="section-title">Yerleşim</h2>
                <div class="layout-grid">
                    <div class="layout-option active" onclick="setLayout(1, this)">1x1</div>
                    <div class="layout-option" onclick="setLayout(2, this)">2x2</div>
                    <div class="layout-option" onclick="setLayout(3, this)">2x3</div>
                </div>
            </div>

            <div class="settings-section">
                <h2 class="section-title">Tema Renkleri</h2>
                <div class="color-palette">
                    <div class="color-swatch active" style="background: #1a1e1a;" onclick="setThemeColor('#1a1e1a', this)"></div>
                    <div class="color-swatch" style="background: #1e1a1a;" onclick="setThemeColor('#1e1a1a', this)"></div>
                    <div class="color-swatch" style="background: #1a1c1e;" onclick="setThemeColor('#1a1c1e', this)"></div>
                    <div class="color-swatch" style="background: #2a251a;" onclick="setThemeColor('#2a251a', this)"></div>
                </div>
            </div>

            <div class="settings-section" style="margin-top: auto; padding-top: 20px;">
                <div style="background: var(--bg-accent); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border);">
                    <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">KATALOG DURUMU</p>
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <span style="font-size: 24px; font-weight: 600; font-family: var(--font-serif);" id="item-count">0</span>
                        <span style="font-size: 12px; color: var(--primary);">Ürün Seçildi</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="toast" class="toast">Mesaj</div>

    <!-- Add Product Modal -->
    <div class="modal-overlay" id="add-product-modal">
        <div class="modal">
            <h3 class="modal-title">Yeni Ürün Ekle</h3>
            <div class="modal-form">
                <label class="file-upload-label" id="file-preview-label">
                    <span id="upload-placeholder">📸 Fotoğraf Seç</span>
                    <input type="file" id="new-product-file" accept="image/*" onchange="previewImage(this)">
                </label>
                <div class="input-wrap">
                    <label>Ürün Adı</label>
                    <input type="text" id="new-product-name" class="input-text" placeholder="Örn: Pembe Domates">
                </div>
                <div class="input-wrap">
                    <label>Açıklama</label>
                    <textarea id="new-product-desc" class="input-text" style="height: 80px; padding: 10px; resize: none;" placeholder="Ürün özellikleri..."></textarea>
                </div>
                <div class="input-wrap">
                    <label>Fiyat (Opsiyonel)</label>
                    <input type="text" id="new-product-price" class="input-text" placeholder="Örn: ₺50 / Paket">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
                    <button class="btn btn-ghost" onclick="closeAddProductModal()">Vazgeç</button>
                    <button class="btn btn-primary" onclick="saveNewProduct()">Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { 
                id: 1, 
                name: 'Black Krim Domates', 
                category: 'tohum', 
                code: 'TM-001', 
                tag: 'En Sevilen', 
                desc: 'Organik ata tohumu Black Krim domates. İri, etli ve aromatik meyveler.',
                price: '₺120 / Paket',
                img: 'assets/tomato.png'
            },
            { 
                id: 2, 
                name: 'Mini Salatalık Fidesi', 
                category: 'fide', 
                code: 'FD-042', 
                tag: 'Hızlı Hasat', 
                desc: 'Hızlı gelişim gösteren, hastalıklara dirençli mini salatalık fidesi.',
                price: '₺45 / Adet',
                img: 'assets/cucumber.png'
            },
            { 
                id: 3, 
                name: 'Dolmalık Biber Tohumu', 
                category: 'tohum', 
                code: 'TM-005', 
                tag: 'Verimli', 
                desc: 'Yüksek verimli, kalın etli dolmalık biber tohumları.',
                price: '₺85 / Paket',
                img: 'assets/pepper.png'
            },
            { 
                id: 4, 
                name: 'Cherry Domates Fidesi', 
                category: 'fide', 
                code: 'FD-012', 
                tag: 'Yeni', 
                desc: 'Salkım cherry domates. Balkon üretimine uygun hibrit fide.',
                price: '₺38 / Adet',
                img: 'assets/seedling.png'
            },
            { 
                id: 5, 
                name: 'Sivri Biber Tohumu', 
                category: 'tohum', 
                code: 'TM-009', 
                tag: '', 
                desc: 'Arap tip, ince uzun sivri biber tohumu. Orta acı.',
                price: '₺75 / Paket',
                img: 'assets/pepper.png'
            },
            { 
                id: 6, 
                name: 'Köy Tipi Domates Fidesi', 
                category: 'fide', 
                code: 'FD-008', 
                tag: 'Ata Tohum', 
                desc: 'Anadolu yerli tip domates fidesi. Geleneksel tat.',
                price: '₺42 / Adet',
                img: 'assets/tomato.png'
            }
        ];

        let selectedIds = new Set();
        let currentGridCols = 2;
        let currentCategory = 'tümü';
        let zoomLevel = 1;

        function renderProducts(filter = '') {
            const list = document.getElementById('product-list');
            const filtered = products.filter(p => {
                const matchCat = currentCategory === 'tümü' || p.category === currentCategory;
                const matchName = p.name.toLowerCase().includes(filter.toLowerCase());
                return matchCat && matchName;
            });

            list.innerHTML = filtered.map(p => `
                <div class="product-card ${selectedIds.has(p.id) ? 'selected' : ''}" onclick="toggleProduct(${p.id})">
                    <img src="${p.img}" class="product-thumb" alt="${p.name}">
                    <div class="product-info">
                        <h4>${p.name}</h4>
                        <p>${p.code} • ${p.price}</p>
                        ${p.tag ? `<span class="product-tag">${p.tag}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function toggleProduct(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('item-count').textContent = selectedIds.size;
            renderProducts();
            renderCatalog();
        }

        function renderCatalog() {
            const container = document.getElementById('canvas-pages-container');
            const selectedItems = products.filter(p => selectedIds.has(p.id));
            const brandName = document.querySelector('.input-text[oninput="updateBrand(this.value)"]').value;
            const subtitle = document.querySelector('.input-text[oninput="updateSubtitle(this.value)"]').value;
            const season = document.querySelector('.input-text[oninput="updateSeason(this.value)"]').value;
            
            // Items per page based on grid (Optimized for A4 height)
            const itemsPerPage = currentGridCols === 1 ? 2 : 4;
            const pageCount = Math.max(1, Math.ceil(selectedItems.length / itemsPerPage));
            
            let pagesHtml = '';

            for (let i = 0; i < pageCount; i++) {
                const pageItems = selectedItems.slice(i * itemsPerPage, (i + 1) * itemsPerPage);
                const pageNum = i + 1;
                
                let gridHtml = pageItems.map(p => `
                    <div class="catalog-item">
                        <div class="item-image-box">
                            <img src="${p.img}" alt="${p.name}">
                        </div>
                        <div class="item-details">
                            <h3>${p.name}</h3>
                            <p>${p.desc}</p>
                            <div class="item-price">${p.price}</div>
                        </div>
                    </div>
                `).join('');

                // Fill empty slots on the LAST page if needed
                if (pageNum === pageCount && pageItems.length < itemsPerPage) {
                    const emptyCount = itemsPerPage - pageItems.length;
                    for (let j = 0; j < emptyCount; j++) {
                        gridHtml += `<div class="empty-slot"><span>+</span><small>Ürün Ekleyin</small></div>`;
                    }
                }

                pagesHtml += `
                    <div class="a4-page" style="transform: scale(${zoomLevel}); margin-bottom: 40px;">
                        <div class="catalog-header">
                            <div class="catalog-brand">
                                <h1>${brandName}</h1>
                                <p>${subtitle}</p>
                            </div>
                            <div class="catalog-meta">
                                <p>SAYFA ${pageNum.toString().padStart(2, '0')}</p>
                                <p>${season}</p>
                            </div>
                        </div>
                        <div class="catalog-grid" style="grid-template-columns: repeat(${currentGridCols}, 1fr)">
                            ${gridHtml}
                        </div>
                        <div class="catalog-footer">
                            <span>katalogai.com / tarim-ekosistemi</span>
                            <span>Tüm hakları saklıdır © 2026</span>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = pagesHtml;
        }

        function filterProducts(val) {
            renderProducts(val);
        }

        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderProducts();
        }

        function updateBrand(val) {
            renderCatalog();
        }

        function updateSubtitle(val) {
            renderCatalog();
        }

        function updateSeason(val) {
            renderCatalog();
        }

        function setLayout(cols, el) {
            currentGridCols = cols === 3 ? 2 : cols; // Simplify for demo
            if(cols === 3) currentGridCols = 2; // Fixed to 2 for looks in this demo A4
            
            document.querySelectorAll('.layout-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            renderCatalog();
        }

        function setThemeColor(color, el) {
            document.getElementById('page').style.borderTop = `10px solid ${color}`;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function zoom(delta) {
            zoomLevel = Math.max(0.3, Math.min(1.5, zoomLevel + delta));
            document.querySelectorAll('.a4-page').forEach(page => {
                page.style.transform = `scale(${zoomLevel})`;
            });
            document.getElementById('zoom-text').textContent = Math.round(zoomLevel * 100) + '%';
        }

        function resetCanvas() {
            selectedIds.clear();
            updateUI();
        }

        // New Product Logic
        function openAddProductModal() {
            document.getElementById('add-product-modal').classList.add('show');
        }

        function closeAddProductModal() {
            document.getElementById('add-product-modal').classList.remove('show');
            resetModalForm();
        }

        function resetModalForm() {
            document.getElementById('new-product-name').value = '';
            document.getElementById('new-product-desc').value = '';
            document.getElementById('new-product-price').value = '';
            document.getElementById('new-product-file').value = '';
            document.getElementById('upload-placeholder').style.display = 'block';
            const existingImg = document.getElementById('file-preview-label').querySelector('img');
            if(existingImg) existingImg.remove();
        }

        let tempImg = '';
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempImg = e.target.result;
                    document.getElementById('upload-placeholder').style.display = 'none';
                    let img = document.getElementById('file-preview-label').querySelector('img');
                    if(!img) {
                        img = document.createElement('img');
                        document.getElementById('file-preview-label').appendChild(img);
                    }
                    img.src = tempImg;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveNewProduct() {
            const name = document.getElementById('new-product-name').value;
            const desc = document.getElementById('new-product-desc').value;
            const price = document.getElementById('new-product-price').value || '₺ --';
            
            if(!name || !tempImg) {
                showToast('İsim ve fotoğraf zorunludur!');
                return;
            }

            const newProd = {
                id: Date.now(),
                name: name,
                category: 'custom',
                code: 'NEW',
                tag: 'Özel',
                desc: desc,
                price: price,
                img: tempImg
            };

            products.unshift(newProd);
            renderProducts();
            closeAddProductModal();
            showToast('Ürün başarıyla eklendi!');
        }

        async function exportToPDF() {
            window.print();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Initialize
        renderProducts();
        renderCatalog();
    </script>
</body>
</html>
