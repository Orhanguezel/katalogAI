# KatalogAI — Nginx Reverse Proxy
# Kullanim: Bu dosyayi /etc/nginx/sites-available/katalogai.conf olarak kopyala
# ln -s /etc/nginx/sites-available/katalogai.conf /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

upstream katalogai_backend {
    server 127.0.0.1:8078;
}

upstream katalogai_admin {
    server 127.0.0.1:3030;
}

# HTTP -> HTTPS yonlendirme
server {
    listen 80;
    server_name katalogai.com www.katalogai.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name katalogai.com www.katalogai.com;

    # SSL — Let's Encrypt / certbot
    ssl_certificate /etc/letsencrypt/live/katalogai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/katalogai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Genel ayarlar
    client_max_body_size 50M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Backend API
    location /api/ {
        proxy_pass http://katalogai_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Upload dizini (local storage kullaniliyorsa)
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Admin Panel (Next.js)
    location / {
        proxy_pass http://katalogai_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://katalogai_admin;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
