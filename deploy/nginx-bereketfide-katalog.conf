# =============================================================
# KatalogAI — bereketfide.com/katalog altında çalışma
#
# Bu dosya mevcut bereketfide nginx config'ine EKLENİR.
# /etc/nginx/sites-available/bereketfide.com dosyasına
# aşağıdaki location bloklarını ekleyin.
#
# Backend: 127.0.0.1:8083 (KatalogAI backend — Docker port)
# Admin:   127.0.0.1:3030 (KatalogAI admin panel — Next.js)
#
# Sonra: nginx -t && systemctl reload nginx
# =============================================================

# ── Mevcut bereketfide.com server bloğuna EKLE ──────────────────

    # KatalogAI Backend API
    location /katalog/api/ {
        rewrite ^/katalog/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # KatalogAI Backend Uploads (görseller)
    location /katalog/uploads/ {
        rewrite ^/katalog/uploads/(.*)$ /uploads/$1 break;
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # KatalogAI Admin Panel (Next.js)
    location /katalog/ {
        rewrite ^/katalog/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # KatalogAI Next.js static assets
    location /katalog/_next/ {
        rewrite ^/katalog/_next/(.*)$ /_next/$1 break;
        proxy_pass http://127.0.0.1:3030;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
